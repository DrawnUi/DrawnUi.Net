<script>
(function () {
    var path = window.location.pathname;

    if (window.location.protocol === "file:") {
        window.location.replace("./index.html");
        return;
    }

    var sampleRoots = [
        "/samples/wasm/blazor-sandbox/"
    ];

    for (var i = 0; i < sampleRoots.length; i++) {
        var sampleRoot = sampleRoots[i];

        if (path === sampleRoot.slice(0, -1) || path.indexOf(sampleRoot) === 0) {
            var suffix = path.slice(sampleRoot.length - 1);
            var target = new URL(sampleRoot, window.location.origin);

            if (suffix && suffix !== "/") {
                target.searchParams.set('path', suffix);
            }

            window.location.replace(target.toString());
            return;
        }
    }

    window.location.replace("/");
})();
</script>
