    id: IsViewRealizedForIndex
    path: ../src/Shared/DrawnUi/Draw/Layout/ViewsAdapter.cs
    startLine: 553
  assemblies:
  - DrawnUi.Maui
  namespace: DrawnUi.Draw
  summary: >-
    Read-only: is a realized (in-use) view currently mapped to this item index? A background plane

    renderer calls <xref href="DrawnUi.Draw.ViewsAdapter.GetViewForIndex(System.Int32%2cDrawnUi.Draw.SkiaControl%2cSystem.Single%2cSystem.Boolean)" data-throw-if-not-resolved="false"></xref> off the render thread and bails the whole draw if it

    returns null (pool not yet realized after a grow/rekey). Checking this on the render thread before

    dispatching an off-thread bake lets a self-caching layout fall back to a synchronous record for the

    few frames until the views are realized — avoiding a baked-in empty band.
  example: []
  syntax:
    content: public bool IsViewRealizedForIndex(int index)
    parameters:
    - id: index
      type: System.Int32
    return:
      type: System.Boolean
    content.vb: Public Function IsViewRealizedForIndex(index As Integer) As Boolean
  overload: DrawnUi.Draw.ViewsAdapter.IsViewRealizedForIndex*
  nameWithType.vb: ViewsAdapter.IsViewRealizedForIndex(Integer)
