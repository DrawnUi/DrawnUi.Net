    id: ApplyInsertShift
    path: ../src/Shared/DrawnUi/Draw/Layout/ViewsAdapter.cs
    startLine: 443
  assemblies:
  - DrawnUi.Maui
  namespace: DrawnUi.Draw
  summary: >-
    Synchronously aligns the adapter with an index shift the layout structure is applying

    right now (e.g. head insert for backward LoadMore): rekeys the views currently in use

    (so a visible cell keeps its view and binding — rebinding becomes a no-op) and swaps in

    a fresh data-contexts snapshot. Without this the structure indices move immediately on

    the render thread while the adapter waits for a POSTED InitializeSoft — for one frame

    visible indices resolve to pre-insert items: wrong contexts flash and their draw-time

    remeasure poisons the structure with wrong heights.

    Call from the render thread, atomically with the structure index shift, after the

    source mutation has completed.
  example: []
  syntax:
    content: public void ApplyInsertShift(IList source, int startIndex, int count, IList preCaptured = null)
    parameters:
    - id: source
      type: System.Collections.IList
    - id: startIndex
      type: System.Int32
    - id: count
      type: System.Int32
    - id: preCaptured
      type: System.Collections.IList
    content.vb: Public Sub ApplyInsertShift(source As IList, startIndex As Integer, count As Integer, preCaptured As IList = Nothing)
  overload: DrawnUi.Draw.ViewsAdapter.ApplyInsertShift*
  nameWithType.vb: ViewsAdapter.ApplyInsertShift(IList, Integer, Integer, IList)
  fullName.vb: DrawnUi.Draw.ViewsAdapter.ApplyInsertShift(System.Collections.IList, Integer, Integer, System.Collections.IList)
  name.vb: ApplyInsertShift(IList, Integer, Integer, IList)
