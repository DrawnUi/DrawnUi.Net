  assemblies:
  - DrawnUi.Maui
  namespace: DrawnUi.Draw
  summary: >-
    Built-in <xref href="DrawnUi.Draw.IWindowHost" data-throw-if-not-resolved="false"></xref> over a <xref href="DrawnUi.Draw.SkiaScroll" data-throw-if-not-resolved="false"></xref> + templated <xref href="DrawnUi.Draw.SkiaLayout" data-throw-if-not-resolved="false"></xref>.

    Wires a <xref href="DrawnUi.Draw.WindowedSource%601" data-throw-if-not-resolved="false"></xref> to the controls with no subclassing: uses the layout's own

    <xref href="DrawnUi.Draw.SkiaLayout.SuppressLoadMore" data-throw-if-not-resolved="false"></xref> and <xref href="DrawnUi.Draw.SkiaLayout.MeasurementApplied" data-throw-if-not-resolved="false"></xref> primitives.

    The layout's <code>ItemsSource</code> must be the window's <code>Items</code> collection.
  example: []
  syntax:
    content: 'public sealed class SkiaScrollWindowHost : IWindowHost'
    content.vb: Public NotInheritable Class SkiaScrollWindowHost Implements IWindowHost
