  assemblies:
  - DrawnUi.Maui
  namespace: DrawnUi.Draw
  summary: >-
    A touch-driven SkSL post effect: every press fires an expanding shockwave that pushes

    pixels radially outward at the wavefront, overshoots and springs back, with a heat flash

    at the ring. Attach to a cached (GPU) control's <code>VisualEffects</code>; it captures its own

    gestures (<xref href="DrawnUi.Draw.ISkiaGestureProcessor" data-throw-if-not-resolved="false"></xref>) and animates each wave to completion.

    Single-texture (no reflection source), so it works on any content.
  example: []
  syntax:
    content: 'public class SkiaTouchShockwaveEffect : SkiaShaderEffect, INotifyPropertyChanged, IDisposable, IPostRendererEffect, IComparable, IComparable<SkiaShaderEffect>, IEquatable<SkiaShaderEffect>, IStateEffect, ISkiaEffect, ICanBeUpdatedWithContext, ICanBeUpdated, ISkiaGestureProcessor'
