    id: Material3
    path: ../src/Shared/DrawnUi/Internals/Enums/PrebuiltControlStyle.cs
    startLine: 33
  assemblies:
  - DrawnUi.Maui
  namespace: DrawnUi.Draw
  summary: >-
    Google Android style, Material Design 3 (Material You): primary #6750A4 palette,

    outlined/filled switch, pill buttons, progress with gap + stop indicator.

    This is what <xref href="DrawnUi.Draw.PrebuiltControlStyle.Platform" data-throw-if-not-resolved="false"></xref> resolves to on Android.

    Appended after Windows to keep existing enum numeric values stable.
  example: []
  syntax:
    content: Material3 = 5
    return:
      type: DrawnUi.Draw.PrebuiltControlStyle
