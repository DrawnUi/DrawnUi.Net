  summary: >-
    Google Android style, Material Design 2 era. Kept as-is for apps that already

    ship with this look; new apps usually want <xref href="DrawnUi.Draw.PrebuiltControlStyle.Material3" data-throw-if-not-resolved="false"></xref>.
