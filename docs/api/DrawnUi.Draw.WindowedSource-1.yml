  assemblies:
  - DrawnUi.Maui
  namespace: DrawnUi.Draw
  summary: >-
    A sliding-window adapter over a remote/large data source for a virtualizing scroll. It keeps only a

    bounded slice (<xref href="DrawnUi.Draw.WindowedSource%601.WindowStart" data-throw-if-not-resolved="false"></xref>..<xref href="DrawnUi.Draw.WindowedSource%601.WindowEnd" data-throw-if-not-resolved="false"></xref>) materialized in <xref href="DrawnUi.Draw.WindowedSource%601.Items" data-throw-if-not-resolved="false"></xref>

    and pulls more from an <xref href="DrawnUi.Draw.IWindowDataSource%601" data-throw-if-not-resolved="false"></xref> in BOTH directions as the user scrolls,

    capping memory by trimming the opposite end. It NEVER holds the full collection.


    Built for the INVERTED chat model (Rotation=180): the window is exposed newest-first, i.e.

    <code>Items[i]</code> maps to global <code>WindowEnd - 1 - i</code>. The data source returns ascending global

    order; this class owns the inversion. Mapping lives in one place (<xref href="DrawnUi.Draw.WindowedSource%601.ToLocal(System.Int32)" data-throw-if-not-resolved="false"></xref>/<xref href="DrawnUi.Draw.WindowedSource%601.ToGlobal(System.Int32)" data-throw-if-not-resolved="false"></xref>).


    Every data access — initial seed, LoadOlder, LoadNewer, and the "long jump" window-replace — is async

    and toggles a loading flag so a single spinner can be shown (and repositioned) per operation.
