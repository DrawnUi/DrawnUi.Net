  assemblies:
  - DrawnUi.Maui
  namespace: DrawnUi.Draw
  summary: >-
    BUILT-IN sliding window between a large user ItemsSource and the rendering pipeline.

    The pipeline binds to <xref href="DrawnUi.Draw.ItemsSourceWindow.Items" data-throw-if-not-resolved="false"></xref> (a bounded slice in natural source order, exposed via

    SkiaLayout.EffectiveItemsSource); this controller slides the slice INTERNALLY over the full source

    (in-memory, synchronous — no spinners) as the user scrolls, reusing the layout's existing

    structure-preserving mutation paths (tail append, head-insert rebase, head/tail window trims).

    The app's LoadMoreCommand/LoadMoreTopCommand fire ONLY when the window reaches a source edge —

    separating "page within already-available data" (internal) from "fetch more data" (app/API).

    Engaged automatically by <xref href="DrawnUi.Draw.SkiaLayout.TryEngageItemsWindow" data-throw-if-not-resolved="false"></xref> when a templated ItemsSource

    exceeds <xref href="DrawnUi.Draw.SkiaLayout.WindowSourceThreshold" data-throw-if-not-resolved="false"></xref>; capacity is retuned from the real viewport

    (<xref href="DrawnUi.Draw.SkiaLayout.WindowSourceViewports" data-throw-if-not-resolved="false"></xref> viewports) once the first visible range is known.
  example: []
  syntax:
    content: public class ItemsSourceWindow
    content.vb: Public Class ItemsSourceWindow
