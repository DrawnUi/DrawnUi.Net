    id: MapToLocalForScroll
    path: ../src/Shared/DrawnUi/Draw/Layout/Windowing/ItemsSourceWindow.cs
    startLine: 161
  assemblies:
  - DrawnUi.Maui
  namespace: DrawnUi.Draw
  summary: >-
    Maps a GLOBAL (ItemsSource-space) index to a window-local one for a programmatic scroll.

    Resident target = plain mapping. Non-resident = the window REBASES centered on the target

    (ReplaceRange -&gt; the layout's clean full-replace reset path, templates preserved), then the

    returned local index is scrolled to by the caller's ordered-scroll machinery, which waits out

    the staged structure change before resolving geometry. Call on the UI thread.
  example: []
  syntax:
    content: public int MapToLocalForScroll(int global)
    parameters:
    - id: global
      type: System.Int32
    return:
      type: System.Int32
