  assemblies:
  - DrawnUi.Maui
  namespace: DrawnUi.Draw
  summary: >-
    The scroll + virtualizing-stack surface a <xref href="DrawnUi.Draw.WindowedSource%601" data-throw-if-not-resolved="false"></xref> drives. One thin

    adapter wires it to the concrete controls (<xref href="DrawnUi.Draw.SkiaScroll" data-throw-if-not-resolved="false"></xref> + <xref href="DrawnUi.Draw.SkiaLayout" data-throw-if-not-resolved="false"></xref>);

    the controller itself stays free of any control type so it is fully reusable/testable.

    The built-in adapter is <xref href="DrawnUi.Draw.SkiaScrollWindowHost" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: public interface IWindowHost
    content.vb: Public Interface IWindowHost
