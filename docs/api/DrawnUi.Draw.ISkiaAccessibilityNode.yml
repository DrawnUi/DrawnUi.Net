  assemblies:
  - DrawnUi.Maui
  namespace: DrawnUi.Draw
  summary: >-
    Marks a drawn control as an accessibility node visible to screen readers and assistive technology.

    Analogous to <xref href="DrawnUi.Draw.ISkiaGestureListener" data-throw-if-not-resolved="false"></xref> for the gesture system — implement this interface

    (or set <code>AccessibilityRole</code> on a <xref href="DrawnUi.Draw.SkiaControl" data-throw-if-not-resolved="false"></xref>) and the control registers itself

    automatically with the <code>SkiaAccessibilityManager</code> on first layout and unregisters on detachment.
  example: ""
  syntax:
    content: public interface ISkiaAccessibilityNode
    content.vb: Public Interface ISkiaAccessibilityNode
  extensionMethods:
  - System.Object.DrawnUi.Extensions.InternalExtensions.FromPlatform
