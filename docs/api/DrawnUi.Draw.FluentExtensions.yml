    id: UpdateNonStop
    path: ../src/Shared/DrawnUi/Internals/Extensions/FluentExtensions.Shared.cs
    startLine: 310
  assemblies:
  - DrawnUi.Maui
  namespace: DrawnUi.Draw
  summary: >-
    Keeps the control's surface repainting every frame forever, without changing any

    property. Needed for visuals that advance on their own each frame from outside the

    property system — e.g. a time-driven <code>SkiaShaderEffect</code> (reads <code>iTime</code>) or a

    clock drawn in <code>WhenPaint</code>. Without it the control draws once and freezes, since

    nothing invalidates it. Implemented as an infinite no-op animator: a running animator

    keeps the render loop alive, so the shader/paint re-runs with a fresh frame time.

    Auto-stops when the control is disposed. Use only for genuinely animated visuals —

    it holds the canvas at full frame rate.
  example: []
  syntax:
    content: 'public static T UpdateNonStop<T>(this T control) where T : SkiaControl'
    parameters:
    - id: control
      type: '{T}'
    typeParameters:
    - id: T
    return:
      type: '{T}'
    content.vb: Public Shared Function UpdateNonStop(Of T As SkiaControl)(control As T) As T
