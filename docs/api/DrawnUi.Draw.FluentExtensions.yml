    path: ../src/Shared/DrawnUi/Internals/Extensions/FluentExtensions.Shared.cs
    startLine: 215
  assemblies:
  - DrawnUi.Maui
  namespace: DrawnUi.Draw
  summary: >-
    Starts a frame-rate independent animation driven by the framework animator

    (which ticks off FrameTimeNanos), so it runs at the same visual speed on any

    device regardless of FPS. Every frame the callback receives: the control, the

    animator (call <code>animator.Stop()</code> to end it early), the eased progress of

    the current cycle (0..1) and the seconds elapsed since the previous frame

    (delta time). The animator auto-unregisters when the control is disposed.
  example: []
  syntax:
    content: 'public static T Animate<T>(this T control, double seconds, Action<T, SkiaValueAnimator, double, double> onFrame, int repeat = 0, Easing easing = null, bool pingPong = false, double delaySeconds = 0) where T : SkiaControl'
    parameters:
    - id: control
      type: '{T}'
      description: Control to animate.
    - id: seconds
      type: System.Double
      description: Duration of one cycle, in seconds.
    - id: onFrame
      type: System.Action{{T},DrawnUi.Draw.SkiaValueAnimator,System.Double,System.Double}
      description: (control, animator, value 0..1, deltaSeconds) — invoked each frame.
    - id: repeat
      type: System.Int32
      description: -1 = loop forever, N = N extra cycles, 0 = play once.
    - id: easing
      type: Microsoft.Maui.Easing
      description: Value curve; null = linear.
    - id: pingPong
      type: System.Boolean
      description: If true the value bounces 0→1→0 each cycle instead of restarting at 0.
    - id: delaySeconds
      type: System.Double
      description: Initial delay before starting, in seconds.
    typeParameters:
    - id: T
      description: Type of SkiaControl.
    return:
      type: '{T}'
      description: The control for chaining.
    content.vb: Public Shared Function Animate(Of T As SkiaControl)(control As T, seconds As Double, onFrame As Action(Of T, SkiaValueAnimator, Double, Double), repeat As Integer = 0, easing As Easing = Nothing, pingPong As Boolean = False, delaySeconds As Double = 0) As T
  overload: DrawnUi.Draw.FluentExtensions.Animate*
  nameWithType.vb: FluentExtensions.Animate(Of T)(T, Double, Action(Of T, SkiaValueAnimator, Double, Double), Integer, Easing, Boolean, Double)
  fullName.vb: DrawnUi.Draw.FluentExtensions.Animate(Of T)(T, Double, System.Action(Of T, DrawnUi.Draw.SkiaValueAnimator, Double, Double), Integer, Microsoft.Maui.Easing, Boolean, Double)
  name.vb: Animate(Of T)(T, Double, Action(Of T, SkiaValueAnimator, Double, Double), Integer, Easing, Boolean, Double)
