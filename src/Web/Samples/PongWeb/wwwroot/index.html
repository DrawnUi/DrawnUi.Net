<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong — DrawnUI Web</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0A0F1E;
            font-family: Arial, sans-serif;
        }

        #drawnui-canvas {
            width: 100vw;
            height: 100vh;
            display: block;
            touch-action: none;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div id="loading">Loading Pong...</div>
    <canvas id="drawnui-canvas"></canvas>

    <script type="module" src="./main.js"></script>
</body>
</html>
