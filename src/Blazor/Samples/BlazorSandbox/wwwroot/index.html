<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DrawnUI for Blazor</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="_content/DrawnUi.Blazor.Core/drawnui-loader.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="BlazorSandbox.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="boot-shell" data-loader-theme="light" aria-label="Loading DrawnUI for Blazor">
            <div class="boot-stage">
                <div class="boot-logo-wrap">
                    <img class="boot-logo"
                         src="_content/DrawnUi.Blazor.Core/drawnui-logo-black.svg"
                         data-logo-dark="_content/DrawnUi.Blazor.Core/drawnui-logo.svg"
                         data-logo-light="_content/DrawnUi.Blazor.Core/drawnui-logo-black.svg"
                         alt="DrawnUI" />
                    <span class="boot-spark" style="--a:15deg;--r:6.8rem;--du:2.1s;--de:0s;--c:#4b8ef9"></span>
                    <span class="boot-spark" style="--a:72deg;--r:6.4rem;--du:1.8s;--de:0.38s;--c:#f25536"></span>
                    <span class="boot-spark" style="--a:138deg;--r:7rem;--du:2.4s;--de:0.72s;--c:#e4a130"></span>
                    <span class="boot-spark" style="--a:195deg;--r:6.2rem;--du:1.9s;--de:1.08s;--c:#78549e"></span>
                    <span class="boot-spark" style="--a:252deg;--r:6.8rem;--du:2.2s;--de:1.44s;--c:#4b8ef9"></span>
                    <span class="boot-spark" style="--a:315deg;--r:6rem;--du:1.7s;--de:0.56s;--c:#f25536"></span>
                    <span class="boot-spark" style="--a:42deg;--r:7.4rem;--du:2.6s;--de:0.92s;--c:#e4a130"></span>
                    <span class="boot-spark" style="--a:172deg;--r:7.6rem;--du:2s;--de:1.6s;--c:#78549e"></span>
                </div>
                <div class="boot-foot">
                    <div class="boot-copy">DrawnUI Blazor Sandbox</div>
                    <div class="boot-progress" aria-hidden="true">
                        <div class="boot-progress-track">
                            <div class="boot-progress-fill"></div>
                        </div>
                        <div class="boot-progress-text"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script>
        (function () {
            var url = new URL(window.location.href);
            var route = url.searchParams.get('path');

            if (!route) {
                return;
            }

            url.searchParams.delete('path');

            var baseHref = document.querySelector('base')?.getAttribute('href') || '/';
            var origin = window.location.origin;
            var baseUrl = new URL(baseHref, origin);
            var normalizedBasePath = baseUrl.pathname.endsWith('/') ? baseUrl.pathname : baseUrl.pathname + '/';
            var normalizedRoute = route.startsWith('/') ? route.slice(1) : route;
            var targetUrl = new URL(normalizedRoute, origin + normalizedBasePath);

            if (url.search) {
                targetUrl.search = url.search;
            }

            if (url.hash) {
                targetUrl.hash = url.hash;
            }

            window.history.replaceState(null, '', targetUrl.pathname + targetUrl.search + targetUrl.hash);
        })();
    </script>
    <script src="_content/DrawnUi.Blazor.Core/drawnui-loader.js"></script>
    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script>
        globalThis.DrawnUiLoader.startBlazorWithLoader({}, {
            theme: 'light',
            initialLabel: 'Loading',
            initializingLabel: 'Initializing...',
            failureLabel: 'Failed'
        })
            .catch(error => {
                console.error(error);
            });
    </script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>
</body>

</html>
