<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlazorSandbox</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="BlazorSandbox.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script>
        (function () {
            var url = new URL(window.location.href);
            var route = url.searchParams.get('path');

            if (!route) {
                return;
            }

            url.searchParams.delete('path');

            var baseHref = document.querySelector('base')?.getAttribute('href') || '/';
            var origin = window.location.origin;
            var baseUrl = new URL(baseHref, origin);
            var normalizedBasePath = baseUrl.pathname.endsWith('/') ? baseUrl.pathname : baseUrl.pathname + '/';
            var normalizedRoute = route.startsWith('/') ? route.slice(1) : route;
            var targetUrl = new URL(normalizedRoute, origin + normalizedBasePath);

            if (url.search) {
                targetUrl.search = url.search;
            }

            if (url.hash) {
                targetUrl.hash = url.hash;
            }

            window.history.replaceState(null, '', targetUrl.pathname + targetUrl.search + targetUrl.hash);
        })();
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>
</body>

</html>
