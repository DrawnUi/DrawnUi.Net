name: Build And Deploy Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pages-artifact-id: ${{ steps.upload-pages-artifact.outputs.artifact_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: ./global.json

      - name: Install DocFX
        run: dotnet tool install --global docfx

      - name: Build DocFX site
        shell: pwsh
        run: |
          Set-Location ./docs
          if (Test-Path ./_site) {
              Remove-Item ./_site -Recurse -Force
          }
          docfx ./docfx.json

      - name: Publish WASM samples
        shell: pwsh
        run: ./dev/publish-wasm-samples.ps1
        
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        id: upload-pages-artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./docs/_site
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  cleanup:
    needs:
      - build
      - deploy
    if: ${{ needs.build.outputs.pages-artifact-id != '' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: Delete Pages artifact
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          ARTIFACT_ID: ${{ needs.build.outputs.pages-artifact-id }}
        run: gh api -X DELETE "/repos/${REPOSITORY}/actions/artifacts/${ARTIFACT_ID}"
